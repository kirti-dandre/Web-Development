<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text-Transform-Property</title>
  <style>
    #head{text-transform: lowercase;}
    #header{text-transform: capitalize;}
    #page{text-transform:uppercase ;}
  </style>
</head>
<body>
  <h1 id="head">Lorem Ipsum Dolor Sit Amet Consectetur adipisicing elit. Nihil, ducimus!</h1><hr>
  <h1 id="header">Lorem ipsum dolor sit amet.</h1><hr>
  <h1 id="page">Lorem ipsum, dolor sit amet consectetur adipisicing elit.</h1>
</body>
</html>
