<!DOCTYPE html>
<html lang="en">
<head>
  <title>Text Property</title>
<style>
  .box{height:100px; width: 100px;}
  #box1{background-color:aquamarine; text-align: left;}
  #box2{background-color: rgb(174, 174, 205);text-align: right;}
  #box3{background-color: blueviolet; text-align: center;}
 /* text decoration style*/
  .link{text-decoration: underline;}
  #link1{ text-decoration: line-through;}
  #link2{text-decoration-color: rgb(84, 84, 235);}
  #link3{text-decoration: underline;}
  #link4{text-decoration-color: red;}
</style> 
</head>
<body>
  <!--text align properties-->
  <div id="box1" class="box">box</div><hr>
  <div id="box2" class="box">box</div><hr>
  <div id="box3" class="box">box</div><hr>
  <!--text decoration properties-->
  <h1 id="link1" class="link">link1</h1>
  <h1 id="link2" class="link">link2</h1>
  <h1 id="link3" class="link">link3</h1>
  <h1 id="link4" class="link">link4 kiajhdsgaavlfdh</h1>
</body>
</html>
