<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padding Property</title>
  <style>
    .padding{
      height:50px;
      width:50px;
      padding:10px 20px 10px 20px;
      border:2px dotted rgb(91, 83, 84)
    }
    #padded{background-color: aqua ; margin: 10px 31px 20px 10px;}
    #padded1{background-color: bisque; margin: 20px 10px 21px 10px; border: 2px dashed red;}
    #box{ 
      background-color: aqua;
      height:20px;
      width: 30px; border-radius: 10px; box-sizing: border-box;
      border: 2px solid black ;}
  </style>
</head>
<body>
  <div id="padded" class="padding">padding0</div>
  <div id="padded1" class="padding"> padding1</div>
  <div id="box">box</div>
</body>
</html>
