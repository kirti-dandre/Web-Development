<!DOCTYPE html>
<html lang="en">
<head>
  <title>Flex Order</title>
  <style>
   *{
      MARGIN:0;
      PADDING:0;
    }
    #heading{
      margin: 20px;
    }
    #container{
      height:800px;
      width:900px;
      background-color: rgb(203, 233, 233);
      display: flex;
      flex-wrap: wrap;
      flex-direction: row;
      justify-content: center;
      border: 2px solid gold;
    }
    .box{
      height:90px;
      width:70px;
      margin:5px;
      border: 2px solid palevioletred;
    }
    #box1{
      background-color: rgb(129, 110, 188);
      order: 1;
    }
    #box2{
      background-color: chartreuse;
      order: 3;
    }
    #box3{
      background-color: rgb(239, 146, 16);
      order: 5
      ;
    }
    #box4{
      background-color: darkkhaki;
      order: 2;

    }
    #box5{
      background-color: aquamarine;
      order: 4;
    }
  </style>
  </style>
</head>
<body>
  <div id="container">
    <div id="box1" class="box">box1</div>
    <div id="box2" class="box">box2</div>
    <div id="box3" class="box">box3</div>
    <div id="box4" class="box">box4</div>
    <div id="box5" class="box">box5</div>


  </div>
</body>
</html>
