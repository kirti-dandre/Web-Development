<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Property</title>
  <style>
    .box{height:400px; width :400px;border-radius: 50px; margin: 50px; padding: 50px;}
    #box1{background-color: blueviolet;
    text-align: center; text-decoration: solid red; display: none;}
    #box2{background-color: blanchedalmond; 
    text-align: center; text-decoration: solid pink; display: inline; }
    #box3{background-color:plum; text-align: center; border-color: red; display: inline-block;}
  </style>
</head>
<body>
  <DIV id="box1" class="box"> Box </DIV>
  <div id="box2" class="box"> Box </div>
  <div id="box3" class="box"> Box </div>
</body>
</html>
