<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z-index position property</title>
  <style>
    .container{
      position: relative;
    }
    .box1,.box2{
      position: absolute;
      border:2px solid darkcyan;
      width:100px;
      height:100px;
      font-size: 25px;
      text-align: center;
    }
    .box1{
      left:20px;
      top:60px;
      background-color: bisque;
      z-index: 5;
    }
    .box2{
      left:50px;
      top: 20px;
      background-color: rgb(176, 180, 186);
      z-index: 3;
    }
  </style>
</head>
<body><div class="container">
  <div class="box1">Z-index</div>
  <div class="box2">z- index</div>
  </div>
</body>
</html>
