<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transition</title>
  <style>
    .transition {
      background-color: rgb(249, 225, 10);
      height: 30px;
      width: 150px;
      border-radius: 20px;

      border: 4px dotted black;
      transition-property: all;
      transition-duration: 1s;
      transition-timing-function: steps(2);
      transition-delay: 0s;
      /* transition: all 1s ease-in-out 1s;*/
    }
    .transition:hover {
      height: 70px;
      width: 190px;
      background-color: rgb(52, 95, 10);
      border-color: bisque;
      
    }
    .transition:active {
      background-color: aqua;
      height: 90px;
      width: 210px;
      border-color: blue;

    }
  </style>
</head>
<body>
  <button class = transition>Click Me</button>
</body>
</html>
