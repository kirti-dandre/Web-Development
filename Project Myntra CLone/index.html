<!DOCTYPE html>
<html lang="en">
<head>
  <title>Myntra Clone</title>
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=person" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_bag" />
</head>
<body>
  <header>
   <div class="logo_container">
    <a href="#"><img class="Myntra_home" src="Assets/Myntra.jpg" alt="Myntra"></a>
   </div>
   <div class="nav_bar">
    <a href="#">MEN</a>
    <a href="#">WOMEN</a>
    <a href="#">KIDS</a>
    <a href="#">HOME</a>
    <a href="#">BEAUTY</a>
    <a href="#">GENZ</a>
    <a href="#">STUDIO<sup>NEW</sup></a>
   </div>

   <div class="search_bar"><span class="material-symbols-outlined search_icon">search</span>
    <input class="search_input" placeholder="Search for product, brands and more ">
   </div>
   <div class="action_bar"> 
    <div class="action_container">
      <span class="material-symbols-outlined action_icon">person</span>
      <span class="action_name">Profile</span>
    </div>
   </div>
   <div class="action_container">
    <span class="material-symbols-outlined">favorite</span>
    <span class="action_name">Wishlist</span>
   </div>
   <div class="action_conatainer">
    <span class="material-symbols-outlined">shopping_bag</span>
    <span class="action_name">Bag</span>
   </div>

  </header>
  <main>
    <div class="banner_container">Banner Container</div>
    <div class="banner_heading">Category Heading</div>
    <div class="banner_items">Items</div>
  </main>
  <footer>footer</footer>
</body>
</html>
